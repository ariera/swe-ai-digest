# digest_sources.yaml
# Source manifest for the SWE × AI Weekly Digest
#
# Engineers section:
#   type: rss    → fetch via feedparser — fast, parallel, no browser
#   type: scrape → fetch HTML with httpx + parse with BeautifulSoup (no JS needed)
#   type: chrome → requires authenticated browser session; handled by Chrome agent
#   skip: true   → (optional) disables fetching without losing the source type info
#   aliases:     → (optional) list of alternate names/nicknames for podcast name matching;
#                  e.g. "antirez" for Salvatore Sanfilippo, "Uncle Bob" for Robert C. Martin
#   bio: one-line description included in the digest under each author section.
#        Keep it to a single sentence. Source of truth is here, not engineers_list.md.
#
# Global sources section (not tied to a single engineer):
#   type: podcast → fetch RSS feed; match episodes to engineers by name/alias in title+description
#   label:        → display name used in "Featured in {label}" attribution line

engineers:

  # ── PRIORITY TIER (1–6 in current digest) ──────────────────────────────────

  - slug: simon-willison
    name: Simon Willison
    priority: 1
    bio: "Co-creator of the Django web framework and independent developer whose blog is arguably the highest-volume, most rigorous public writing on LLMs from a practitioner's perspective."
    sources:
      - url: https://simonwillison.net/atom/everything
        type: rss
        label: blog (full feed)
      - url: https://simonwillison.net/atom/links
        type: rss
        label: blog (links only)
      - url: https://fosstodon.org/@simon.rss
        type: rss
        label: Mastodon

  - slug: gergely-orosz
    name: Gergely Orosz
    priority: 2
    bio: "Former engineer at Uber and Skype, author of The Software Engineer's Guidebook, and publisher of The Pragmatic Engineer — the most sustained newsletter coverage of AI's impact on engineering jobs."
    sources:
      - url: https://newsletter.pragmaticengineer.com/feed
        type: rss
        label: Substack (free posts)
      - url: https://blog.pragmaticengineer.com/rss/
        type: rss
        label: blog

  - slug: dhh
    name: DHH
    aliases: [David Heinemeier Hansson]
    priority: 3
    bio: "Creator of Ruby on Rails, co-founder of 37signals (Basecamp/HEY), and outspoken critic of Silicon Valley orthodoxy and AI hype."
    sources:
      - url: https://world.hey.com/dhh/feed.atom
        type: rss
        label: Hey World blog
      - url: https://twitter.com/dhh
        type: chrome
        label: Twitter/X
        note: "Supplement; DHH often shares shorter takes here"

  - slug: john-carmack
    name: John Carmack
    priority: 4
    bio: "Legendary game engine programmer and co-founder of id Software (Doom, Quake), former CTO of Oculus VR, and now one of the most thoughtful public voices on AGI timelines and AI safety."
    sources:
      - url: https://carmack.wordpress.com/feed/
        type: rss
        label: WordPress blog
      - url: https://twitter.com/ID_AA_Carmack
        type: chrome
        label: Twitter/X
        note: "Supplement to blog; long-form thinking often posted here"

  - slug: charity-majors
    name: Charity Majors
    priority: 5
    bio: "Co-founder and CTO of Honeycomb.io, champion of observability-driven development, and an unusually candid voice on engineering culture, AI coding tools, and what it means to be a senior engineer today."
    sources:
      - url: https://charity.wtf/feed/
        type: rss
        label: blog
      - url: https://hachyderm.io/@mipsytipsy.rss
        type: rss
        label: Mastodon

  - slug: grady-booch
    name: Grady Booch
    priority: 6
    bio: "Chief Scientist for Software Engineering at IBM Research, co-creator of UML, and one of the longest-standing public commentators on the intersection of AI and software."
    sources:
      - url: https://twitter.com/Grady_Booch
        type: chrome
        label: Twitter/X
        note: "Primary channel; publishes almost exclusively on Twitter"

  # ── EXTENDED PRIORITY TIER (7–12) ──────────────────────────────────────────

  - slug: kent-beck
    name: Kent Beck
    priority: 7
    bio: "Creator of Extreme Programming (XP) and Test-Driven Development (TDD), co-author of the Agile Manifesto, and author of Tidy First? — now writing actively about AI's impact on software craft."
    sources:
      - url: https://tidyfirst.substack.com/feed
        type: rss
        label: Substack (Tidy First)

  - slug: paul-graham
    name: Paul Graham
    priority: 8
    bio: "Co-founder of Y Combinator, creator of the Arc language, and essayist whose widely-read long-form pieces on startups, programming, and AI have shaped a generation of builders."
    sources:
      - url: http://www.paulgraham.com/articles.html
        type: scrape
        label: essays
        note: "RSS is malformed HTML; scraping articles page. Dates unavailable — undated entries are filtered from weekly digest."

  - slug: bryan-cantrill
    name: Bryan Cantrill
    priority: 9
    bio: "Systems software engineer, co-creator of DTrace, co-founder of Oxide Computer Company, and a vocal, sharp-tongued critic of AI hype in infrastructure and ops."
    sources:
      - url: https://oxide.computer/blog/feed
        type: rss
        label: Oxide blog
        note: "Multi-author blog; filter for Cantrill posts during digest generation"
      - url: https://www.youtube.com/feeds/videos.xml?channel_id=UCFn4S3OexFT9YhxJ8GWdUYQ
        type: rss
        label: Oxide Computer YouTube

  - slug: matteo-collina
    name: Matteo Collina
    priority: 10
    bio: "Node.js TSC member, co-creator of Fastify, creator of Pino, and CTO of Platformatic — writing regularly about the Node.js ecosystem, performance, and AI's role in software development."
    sources:
      - url: https://adventures.nodeland.dev/rss
        type: rss
        label: Adventures in Nodeland (newsletter)
      - url: https://bsky.app/profile/nodeland.dev/rss
        type: rss
        label: Bluesky

  - slug: peter-norvig
    name: Peter Norvig
    priority: 10
    bio: "Director of Research at Google, co-author of the canonical Artificial Intelligence: A Modern Approach textbook, and one of the most credible foundational voices on AI and software."
    sources:
      - url: https://norvig.com
        type: scrape
        label: personal site
        note: "No RSS feed; scrape article list from homepage. Dates unavailable — undated entries are filtered from weekly digest."

  - slug: martin-fowler
    name: Martin Fowler
    priority: 11
    bio: "Chief Scientist at ThoughtWorks, author of Refactoring and Patterns of Enterprise Application Architecture, and original signatory of the Agile Manifesto."
    sources:
      - url: https://martinfowler.com/feed.atom
        type: rss
        label: blog
      - url: https://toot.thoughtworks.com/@mfowler.rss
        type: rss
        label: Mastodon (ThoughtWorks instance)

  - slug: werner-vogels
    name: Werner Vogels
    priority: 12
    bio: "CTO of Amazon Web Services, author of the All Things Distributed blog, and a leading voice on cloud architecture, eventual consistency, and enterprise AI adoption."
    sources:
      - url: https://www.allthingsdistributed.com/atom.xml
        type: rss
        label: blog

  # ── REST OF LIST ────────────────────────────────────────────────────────────

  - slug: robert-c-martin
    name: Robert C. Martin (Uncle Bob)
    aliases: [Uncle Bob, Bob Martin]
    priority: 13
    bio: "Author of Clean Code and The Clean Coder, co-author of the Agile Manifesto, and the foremost evangelist of SOLID principles and software craftsmanship."
    sources:
      - url: https://unclebob.substack.com/feed
        type: rss
        label: Substack
        skip: true
        note: "Last post: Feb 2023. Inactive."
      - url: https://blog.cleancoder.com/atom.xml
        type: rss
        label: Clean Coder blog
        skip: true
        note: "Last post: Jan 2023. Inactive."

  - slug: jonathan-blow
    name: Jonathan Blow
    priority: 14
    bio: "Independent game developer, creator of Braid and The Witness, and a provocative voice on programming language design, software complexity, and the risks of AI-assisted coding."
    sources:
      - url: https://www.youtube.com/feeds/videos.xml?channel_id=UCCuoqzrsHlwv1YyPKLuMDUQ
        type: rss
        label: YouTube
      - url: https://twitter.com/Jonathan_Blow
        type: chrome
        label: Twitter/X

  - slug: dan-north
    name: Dan North
    priority: 15
    bio: "Originator of Behavior-Driven Development (BDD), software delivery coach, and a pragmatic voice on how teams should adapt their practices in the age of AI tools."
    sources:
      - url: https://dannorth.net/blog/index.xml
        type: rss
        label: blog

  - slug: avdi-grimm
    name: Avdi Grimm
    priority: 16
    bio: "Ruby developer, author of Confident Ruby and Exceptional Ruby, and creator of the RubyTapas screencast series on software craftsmanship."
    sources:
      - url: https://avdi.codes/feed/
        type: rss
        label: blog

  - slug: salvatore-sanfilippo
    name: Salvatore Sanfilippo (antirez)
    aliases: [antirez]
    priority: 17
    bio: "Italian software engineer, creator of Redis — one of the world's most widely deployed in-memory data stores — and a rare voice for clarity and minimalism in systems design."
    sources:
      - url: http://antirez.com/rss
        type: rss
        label: blog

  - slug: sandi-metz
    name: Sandi Metz
    priority: 18
    bio: "Ruby programmer, author of Practical Object-Oriented Design in Ruby (POODR), and celebrated speaker on object-oriented design and the costs of complexity."
    sources:
      - url: https://sandimetz.com/blog?format=rss
        type: rss
        label: blog
        note: "Last post 2018 — feed is live but blog is dormant; unlikely to yield weekly content"

  - slug: martin-kleppmann
    name: Martin Kleppmann
    priority: 19
